version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.example
    ports:
      - '4000:4000'
    depends_on:
      - db
      - redis
    networks:
      - kalavault-net

  frontend:
    build:
      context: ./new-frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - kalavault-net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kalavault
      POSTGRES_USER: kalavault
      POSTGRES_PASSWORD: changeme
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - kalavault-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - kalavault-net

networks:
  kalavault-net:
    driver: bridge

volumes:
  db_data:
  redis_data:
